<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERRIF ACTE CE EVARISTE</title>
    <!-- SheetJS ho an'ny Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            padding: 10px 15px;
        }
        .file-input {
            padding: 8px;
            background: #eef2f7;
            border-radius: 5px;
            margin-bottom: 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .action-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .main-content {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0;
            margin-bottom: 10px;
        }
        .form-section {
            flex: 0.8; 
            height: 100%;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
            background: #fff;
            box-sizing: border-box;
        }
        .image-section {
            flex: 2; 
            display: flex;
            flex-direction: column;
            background: #222;
            padding: 10px;
            border-radius: 6px;
            height: 100%;
            box-sizing: border-box;
        }
        .image-container {
            flex: 1;
            width: 100%;
            overflow: auto;
            position: relative;
            background: #111;
            cursor: grab;
            border: 1px solid #444;
        }
        .image-container:active {
            cursor: grabbing;
        }
        .image-container img {
            max-width: none;
            transform-origin: top left;
            transition: transform 0.1s ease;
        }
        .zoom-controls {
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .zoom-controls button {
            background: #fff;
            color: #333;
            padding: 6px 14px;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
            font-size: 13px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 13px;
        }
        input[type="text"]:focus {
            border-color: #007bff;
            outline: none;
            background-color: #f7faff;
        }
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        button.nav-btn {
            padding: 10px 25px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        button.nav-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        button#save-btn {
            background-color: #28a745;
        }
        .reset-db-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .param-btn {
            background-color: #17a2b8;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Modal ho an'ny Paramètre */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            max-height: 60%;
            overflow-y: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .modal h3 { margin-top: 0; }
        .param-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-modal-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>VERRIF ACTE ET TAUX QUALITE EQUIPE EVARISTE</h3><h6>A1 : Nb erreur ------ B1 : chemin image </h6>
    
    <div class="file-input">
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <div>
                <label for="excel-file" style="font-size: 14px; font-weight: bold;">Excel à verrifer (.xlsx na .xls):</label>
                <input type="file" id="excel-file" accept=".xlsx, .xls">
            </div>
            <!-- TEXT BOX VAOVAO AMETRAHANA NY CHEMIN IMAGE -->
            <div>
                <label for="manual-path" style="font-size: 14px; font-weight: bold; color: #007bff;">Chemin Image (Dossier misy sary):</label>
                <input type="text" id="manual-path" placeholder="Ohatra: D:/Sary/ na sary/" style="padding: 6px; width: 280px; border: 2px solid #007bff; border-radius: 4px; font-size: 13px;">
            </div>
        </div>
        <div class="action-container">
            <button class="param-btn" id="param-toggle-btn" style="display:none;" onclick="openModal()">⚙️ Paramètre</button>
            <button class="reset-db-btn" onclick="clearMemory()">Rémise à (0) le memoire</button>
        </div>
    </div>
<!-- Fampisehoana ny champ mifototra eo afovoany -->
<div id="champ-focus-container" style="background: #fff; border: 2px solid #007bff; padding: 15px; margin-bottom: 10px; border-radius: 6px; display: none; text-align: center;">
  
    <div id="champ-focus-text" style="font-size: 36px; font-weight: bold; color: #28a745; margin-top: 5px;">-</div>
</div>
    <div class="main-content" id="app-content" style="display: none;">
        <div class="form-section" id="dynamic-form"></div>
        
        <div class="image-section">
            <div class="zoom-controls">
                <button onclick="zoom(0.1); refillFocus();">Zoom +</button>
                <button onclick="zoom(-0.1); refillFocus();">Zoom -</button>
                <button onclick="resetZoom(); refillFocus();">100%</button>
                <span style="color: #aaa; font-size: 12px; align-self: center; margin-left: 10px;">Raccourcis: Alt+N (Manaraka), Alt+P (Teo aloha)</span>
            </div>
            <!-- Natao mampiasa preventDefault mba tsy ho very focus ny cursor -->
            <div class="image-container" id="img-container" onmousedown="event.preventDefault();">
                <img id="acte-image" src="" alt="Fidio ny sary na diso ny lalana">
            </div>
        </div>
    </div>

    <div class="navigation-buttons" id="nav-section" style="display: none;">
        <button class="nav-btn" id="prev-btn" onclick="changeRow(-1)">Ligne Teo Aloha</button>
        <span id="row-indicator" style="font-weight: bold; font-size: 15px;">Ligne: 0 / 0</span>
        <button class="nav-btn" id="next-btn" onclick="changeRow(1)">Ligne Manaraka</button>
        <button class="nav-btn" id="save-btn" onclick="saveExcelDirectly()">EXPORTER</button>
    </div>
</div>

<!-- Ny varavarankely kely (Modal) fitantanana ny Paramètre -->
<div id="paramModal" class="modal">
    <div class="modal-content">
        <h3>Lohateny haseho / Hatao miafina</h3>
        <p style="font-size: 12px; color: #666;">Esory ny loha-tsoratra tsy tiana hiseho eo amin'ny sisiny ankavia.</p>
        <div id="param-list"></div>
        <button class="close-modal-btn" onclick="closeModal()">OK / Ampiharina</button>
    </div>
</div>
	
<script>
    let excelData = [];
    let headers = [];
    let currentIndex = 0;
    let originalRowData = null;
    let originalFileName = "Excel_Acte.xlsx";
    let hiddenFields = []; // Mitahiry ny lohateny izay nalamina tsy haseho
    let lastActiveInputId = null; // Mitahiry ny textbox farany niasana
    
    let currentScale = 1;
    const imgElement = document.getElementById('acte-image');
    const imgContainer = document.getElementById('img-container');

    // Mamerina ny Chemin Image efa voatahiry tao anaty browser (raha nisy)
    window.addEventListener('DOMContentLoaded', function() {
        const savedPath = localStorage.getItem('global_manual_image_path');
        if (savedPath) {
            document.getElementById('manual-path').value = savedPath;
        }
    });

    // Isaky ny ovaina ny Chemin Image ao anaty Text Box dia tehirizina ary havaozina ny sary
    document.getElementById('manual-path').addEventListener('input', function() {
        localStorage.setItem('global_manual_image_path', this.value);
        if (excelData.length > 0) {
            loadImageForCurrentRow();
        }
    });

    // Mampiditra Raccourcis Clavier (Alt + N sy Alt + P)
    window.addEventListener('keydown', function(e) {
        if (excelData.length === 0) return;
        if (e.altKey && (e.key === 'n' || e.key === 'N')) {
            e.preventDefault();
            changeRow(1);
        }
        if (e.altKey && (e.key === 'p' || e.key === 'P')) {
            e.preventDefault();
            changeRow(-1);
        }
    });

    document.getElementById('excel-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        originalFileName = file.name;

        // Maka ny config an'ny hidden fields raha efa nisy
        const savedHidden = localStorage.getItem('hidden_fields_' + originalFileName);
        if(savedHidden) {
            hiddenFields = JSON.parse(savedHidden);
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            const rawRows = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
            
            if(rawRows.length > 0) {
                headers = rawRows[0].map(h => h !== null && h !== undefined ? h.toString().trim() : "");
                
                excelData = [];
                for(let i = 1; i < rawRows.length; i++) {
                    let rowObj = {};
                    let currentRow = rawRows[i];
                    
                    headers.forEach((header, index) => {
                        if (header !== "") {
                            rowObj[header] = currentRow[index] !== undefined ? currentRow[index] : "";
                        }
                    });
                    excelData.push(rowObj);
                }

                if(excelData.length > 0) {
                    document.getElementById('app-content').style.display = 'flex';
                    document.getElementById('nav-section').style.display = 'flex';
                    document.getElementById('param-toggle-btn').style.display = 'block';
                    
                    const savedIndex = localStorage.getItem('last_saved_index_' + originalFileName);
                    
                    if (savedIndex !== null) {
                        currentIndex = parseInt(savedIndex, 10);
                    } else {
                        const nbErreurField = headers.find(h => h.toLowerCase() === "nb erreur") || "Nb erreur";
                        let firstEmptyRowIndex = excelData.findIndex(row => {
                            let val = row[nbErreurField];
                            return val === undefined || val === null || val.toString().trim() === "";
                        });
                        currentIndex = firstEmptyRowIndex !== -1 ? firstEmptyRowIndex : 0;
                    }

                    buildParamOptions();
                    showRow(currentIndex);
                }
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // Fitaovana manokana mikarakara sy mampiseho ny sary
    function loadImageForCurrentRow() {
        const row = excelData[currentIndex];
        const imgField = headers.find(h => h.toLowerCase() === "chemin image") || "chemin image";
        
        // 1. Alaina ny Chemin Image (na avy amin'ny Text Box vaovao, na avy amin'ny Excel raha tsy nisy soratra teo)
        let basePath = document.getElementById('manual-path').value.trim();
        if (!basePath && row[imgField]) {
            basePath = row[imgField].toString().trim();
        }

        // 2. Karohina raha misy sary (.jpg, .jpeg, .png) voasoratra amin'ilay andalana (ligne) andehanana
        let imageName = "";
        for (let key in row) {
            if (row[key]) {
                const valStr = row[key].toString().trim();
                if (valStr.toLowerCase().endsWith('.jpg') || valStr.toLowerCase().endsWith('.png') || valStr.toLowerCase().endsWith('.jpeg')) {
                    imageName = valStr;
                    break;
                }
            }
        }

        // 3. Atambatra ny Chemin sy ny anaran'ny Sary
        if (basePath) {
            // Ampiana "/" eo amin'ny farany raha mbola tsy misy
            if (!basePath.endsWith('/') && !basePath.endsWith('\\')) {
                basePath += '/';
            }

            if (imageName !== "") {
                imgElement.src = basePath + imageName;
            } else {
                // Raha tsy misy .jpg hita, dia ampiasaina fotsiny izay voasoratra teo
                imgElement.src = basePath;
            }
        } else {
            imgElement.src = "";
        }
        resetZoom();
    }

    function showRow(index) {
        if(index >= excelData.length) index = excelData.length - 1;
        if(index < 0) index = 0;
        currentIndex = index;

        localStorage.setItem('last_saved_index_' + originalFileName, currentIndex);

        const row = excelData[currentIndex];
        originalRowData = JSON.parse(JSON.stringify(row)); 
        
        const formSection = document.getElementById('dynamic-form');
        formSection.innerHTML = ''; 
        
        document.getElementById('row-indicator').innerText = `Ligne: ${currentIndex + 1} / ${excelData.length}`;
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').disabled = currentIndex === excelData.length - 1;

        // Fampisehoana ilay sary vaovao
        loadImageForCurrentRow();

        let firstInputId = null;

        headers.forEach(header => {
            if(!header || header === "" || header.toLowerCase() === "nb erreur") return; 
            
            // Raha natao coché tsy haseho dia dinganina
            if (hiddenFields.includes(header)) return;

            const formGroup = document.createElement('div');
            formGroup.className = 'form-group';

            const label = document.createElement('label');
            label.innerText = header;

            const input = document.createElement('input');
            input.type = 'text';
            input.value = row[header] !== undefined ? row[header] : "";
            input.id = `input-${header}`;
            
            // Rehefa miditra eo amin'ny textbox (focus) - Atao afovoany ny soratra
            input.addEventListener('focus', function() {
                lastActiveInputId = this.id;
                const container = document.getElementById('champ-focus-container');
                const focusText = document.getElementById('champ-focus-text');
                
                container.style.display = 'block';
                focusText.innerText = `${header} : : ${this.value}`;
            });

            // Havaozina mivantana rehefa manoratra ianao
            input.addEventListener('input', function() {
                const focusText = document.getElementById('champ-focus-text');
                focusText.innerText = `${header} : : ${this.value}`;
            });

            if (!firstInputId) firstInputId = input.id;
            
            formGroup.appendChild(label);
            formGroup.appendChild(input);
            formSection.appendChild(formGroup);
        });

        // Mametraka ny cursor eo amin'ny textbox voalohany ambony indrindra rehefa mifindra Ligne
        setTimeout(() => {
            if (firstInputId) {
                const fInput = document.getElementById(firstInputId);
                if (fInput) {
                    fInput.focus();
                    lastActiveInputId = firstInputId;
                }
            }
        }, 50);
    }

    // Mamerina focus eo amin'ny textbox farany teo raha nanao zoom
    function refillFocus() {
        if (lastActiveInputId) {
            const el = document.getElementById(lastActiveInputId);
            if (el) el.focus();
        }
    }

    function changeRow(direction) {
        if(!saveCurrentRowChanges()) return; // Raha misy fanovana ka tsindriana "Annuler" dia mijanona
        
        let targetIndex = currentIndex + direction;
        const nbErreurField = headers.find(h => h.toLowerCase() === "nb erreur") || "Nb erreur";

        if (direction > 0) {
            while (targetIndex < excelData.length) {
                let val = excelData[targetIndex][nbErreurField];
                if (val === undefined || val === null || val.toString().trim() === "") {
                    break;
                }
                targetIndex++;
            }
        } 
        
        if(targetIndex >= 0 && targetIndex < excelData.length) {
            showRow(targetIndex);
        } else if (direction > 0) {
            alert("Vérrification terminé");
        }
    }

    function saveCurrentRowChanges() {
        if (excelData.length === 0) return true;
        
        const row = excelData[currentIndex];
        let errorCount = 0;
        let isChanged = false;
        let changesToApply = [];

        // Fanamarihana ny tsipika novaina rehetra aloha
        headers.forEach(header => {
            if(!header || header === "" || header.toLowerCase() === "nb erreur") return;

            const inputElement = document.getElementById(`input-${header}`);
            if(inputElement) {
                const newValue = inputElement.value;
                const oldValue = originalRowData[header] !== undefined ? originalRowData[header].toString() : "";

                if(newValue !== oldValue) {
                    changesToApply.push({
                        header: header,
                        newValue: newValue,
                        oldValue: oldValue
                    });
                    errorCount++;
                    isChanged = true;
                }
            }
        });

        // Raha nisy fanovana, aseho ny Message Box manontany fanamafisana
        if(isChanged) {
            let message = "Erreur:\n";
            changesToApply.forEach(c => {
                message += `- Type [ ${c.header} ] Non erreur  : "${c.newValue}" (Erreur: "${c.oldValue}")\n`;
            });
            message += "\nHamafiso oe erreur tokoa ve io?";
            
            const confirmation = confirm(message);
            if(!confirmation) {
                return false; // Raha tsindriana ny "Annuler", dia tsy manao na inona na inona
            }

            // Raha nanaiky (OK) izy, dia ampiharina ny fanovana ary ampiana ilay soratra eo aoriana
            changesToApply.forEach(c => {
                row[c.header] = `${c.newValue} [${c.header} Erreur]`; 
            });
            
            const nbErreurField = headers.find(h => h.toLowerCase() === "nb erreur") || "Nb erreur";
            row[nbErreurField] = errorCount;
        } else {
            const nbErreurField = headers.find(h => h.toLowerCase() === "nb erreur") || "Nb erreur";
            // Raha tsy mbola nisy "Nb Erreur" voasoratra mihitsy vao asiana 0
            if (row[nbErreurField] === undefined || row[nbErreurField] === null || row[nbErreurField].toString().trim() === "") {
                row[nbErreurField] = 0; 
            }
        }
        return true;
    }

    // Zoom amin'ny wheel souris + mitazona focus
    imgContainer.addEventListener('wheel', function(e) {
        e.preventDefault();
        const zoomIntensity = 0.1;
        if (e.deltaY < 0) {
            zoom(zoomIntensity);
        } else {
            zoom(-zoomIntensity);
        }
        refillFocus();
    });

    function zoom(amount) {
        currentScale += amount;
        if(currentScale < 0.2) currentScale = 0.2;
        if(currentScale > 6) currentScale = 6; 
        imgElement.style.transform = `scale(${currentScale})`;
    }

    function resetZoom() {
        currentScale = 1;
        imgElement.style.transform = `scale(1)`;
    }

    function saveExcelDirectly() {
        if(!saveCurrentRowChanges()) return; 

        const worksheet = XLSX.utils.json_to_sheet(excelData, {header: headers});
        const newWorkbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(newWorkbook, worksheet, "Sheet1");
        
        XLSX.writeFile(newWorkbook, originalFileName);
        alert("Voatahiry ny fanovana rehetra!");
    }

   // PARAMETRE MODAL SYSTEM
    function buildParamOptions() {
        const paramList = document.getElementById('param-list');
        paramList.innerHTML = '';
        
        headers.forEach(header => {
            // Ny "Nb erreur" ihany sisa no tsy ampidirina ao amin'ny paramètre
            if(!header || header === "" || header.toLowerCase() === "nb erreur") return;
            
            const div = document.createElement('div');
            div.className = 'param-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `param-check-${header}`;
            checkbox.checked = !hiddenFields.includes(header); // True raha haseho
            
            const label = document.createElement('label');
            label.htmlFor = checkbox.id;
            label.innerText = header;
            label.style.display = 'inline';
            label.style.fontWeight = 'normal';
            
            div.appendChild(checkbox);
            div.appendChild(label);
            paramList.appendChild(div);
        });
    }

    function openModal() {
        document.getElementById('paramModal').style.display = 'block';
    }

    function closeModal() {
        hiddenFields = [];
        headers.forEach(header => {
            if(!header || header === "" || header.toLowerCase() === "nb erreur") return;
            const cb = document.getElementById(`param-check-${header}`);
            if (cb && !cb.checked) {
                hiddenFields.push(header); // Ampidirina raha tsy nasiana coche
            }
        });
        
        // Tehirizina ny safidy natao
        localStorage.setItem('hidden_fields_' + originalFileName, JSON.stringify(hiddenFields));
        document.getElementById('paramModal').style.display = 'none';
        
        // Havaozina ny fampisehoana ny tsipika misy anao
        if (excelData.length > 0) showRow(currentIndex);
   
    }

    function clearMemory() {
        localStorage.clear();
        alert("Efa voadio ny fitadidiana sy ny paramètre!");
        location.reload();
    }

    // Drag to scroll ny sary tsy manala focus
    let isDown = false;
    let startX, startY, scrollLeft, scrollTop;

    imgContainer.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - imgContainer.offsetLeft;
        startY = e.pageY - imgContainer.offsetTop;
        scrollLeft = imgContainer.scrollLeft;
        scrollTop = imgContainer.scrollTop;
    });
    imgContainer.addEventListener('mouseleave', () => isDown = false);
    imgContainer.addEventListener('mouseup', () => { isDown = false; refillFocus(); });
    imgContainer.addEventListener('mousemove', (e) => {
        if(!isDown) return;
        const x = e.pageX - imgContainer.offsetLeft;
        const y = e.pageY - imgContainer.offsetTop;
        const walkX = (x - startX) * 1.5;
        const walkY = (y - startY) * 1.5;
        imgContainer.scrollLeft = scrollLeft - walkX;
        imgContainer.scrollTop = scrollTop - walkY;
    });
</script>

</body>
</html>
